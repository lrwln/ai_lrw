<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/✅" />
</head>
<body>


  <div class="keys">
    <div data-key="65" class="key">
      <kbd>A</kbd>
      <span class="sound">clap</span>
    </div>
    <div data-key="83" class="key">
      <kbd>S</kbd>
      <span class="sound">hihat</span>
    </div>
    <div data-key="68" class="key">
      <kbd>D</kbd>
      <span class="sound">kick</span>
    </div>
    <div data-key="70" class="key">
      <kbd>F</kbd>
      <span class="sound">openhat</span>
    </div>
    <div data-key="71" class="key">
      <kbd>G</kbd>
      <span class="sound">boom</span>
    </div>
    <div data-key="72" class="key">
      <kbd>H</kbd>
      <span class="sound">ride</span>
    </div>
    <div data-key="74" class="key">
      <kbd>J</kbd>
      <span class="sound">snare</span>
    </div>
    <div data-key="75" class="key">
      <kbd>K</kbd>
      <span class="sound">tom</span>
    </div>
    <div data-key="76" class="key">
      <kbd>L</kbd>
      <span class="sound">tink</span>
    </div>
  </div>

  <audio data-key="65" src="sounds/clap.wav"></audio>
  <audio data-key="83" src="sounds/hihat.wav"></audio>
  <audio data-key="68" src="sounds/kick.wav"></audio>
  <audio data-key="70" src="sounds/openhat.wav"></audio>
  <audio data-key="71" src="sounds/boom.wav"></audio>
  <audio data-key="72" src="sounds/ride.wav"></audio>
  <audio data-key="74" src="sounds/snare.wav"></audio>
  <audio data-key="75" src="sounds/tom.wav"></audio>
  <audio data-key="76" src="sounds/tink.wav"></audio>

<script>
  const TRANSITION_DURATION = 70;
  const timeoutMap = new Map();

  function removePlayingClass(key) {
    key.classList.remove('playing');
  }

  function playSound(keyCode) {
    const audio = document.querySelector(`audio[data-key="${keyCode}"]`);
    const key = document.querySelector(`div[data-key="${keyCode}"]`);
    if (!audio) return;

    const existingTimeout = timeoutMap.get(keyCode);
    if (existingTimeout) {
      clearTimeout(existingTimeout);
    }

    key.classList.remove('playing');
    void key.offsetWidth;
    key.classList.add('playing');

    const timeoutId = setTimeout(() => {
      removePlayingClass(key);
      timeoutMap.delete(keyCode);
    }, TRANSITION_DURATION);
    timeoutMap.set(keyCode, timeoutId);

    audio.currentTime = 0;
    audio.play();
  }

  function handleKeyDown(e) {
    playSound(e.keyCode);
  }

  function handleKeyClick(e) {
    const keyElement = e.currentTarget;
    const keyCode = keyElement.getAttribute('data-key');
    playSound(parseInt(keyCode));
  }

  const keys = Array.from(document.querySelectorAll('.key'));
  keys.forEach(key => {
    key.addEventListener('click', handleKeyClick);
  });

  window.addEventListener('keydown', handleKeyDown);
</script>


</body>
</html>
