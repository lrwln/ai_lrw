<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积木世界建造器</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #f8f5e6; /* 奶油米色背景 */
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 磨砂玻璃通用样式 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 顶部标题栏 */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            z-index: 100;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .archive-panel {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        select, button {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ffd700;
        }

        /* 底部工具卡片栏 */
        .tool-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            display: flex;
            gap: 16px;
            z-index: 100;
        }

        .tool-card {
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.85);
        }

        .tool-card.active {
            background: #ffd700;
            transform: scale(1.08);
        }

        .tool-card:hover {
            transform: scale(1.05);
        }

        .tool-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .tool-label {
            font-size: 12px;
            color: #333;
        }

        /* 右下角小地图 */
        .minimap {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 160px;
            z-index: 100;
            overflow: hidden;
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div id="scene-container"></div>

    <!-- 顶部UI -->
    <div class="top-bar glass-panel">
        <div class="title">🧱 积木世界建造器</div>
        <div class="archive-panel">
            <select id="archive-select">
                <option value="default">默认存档</option>
            </select>
            <button id="reset-btn">重置世界</button>
            <button id="clear-btn">清空世界</button>
        </div>
    </div>

    <!-- 底部工具栏 -->
    <div class="tool-bar glass-panel">
        <div class="tool-card active" data-type="grass">
            <div class="tool-icon">🌿</div>
            <div class="tool-label">草地</div>
        </div>
        <div class="tool-card" data-type="tree">
            <div class="tool-icon">🌳</div>
            <div class="tool-label">树木</div>
        </div>
        <div class="tool-card" data-type="house">
            <div class="tool-icon">🏠</div>
            <div class="tool-label">房子</div>
        </div>
        <div class="tool-card" data-type="water">
            <div class="tool-icon">💧</div>
            <div class="tool-label">水域</div>
        </div>
    </div>

    <!-- 小地图 -->
    <div class="minimap glass-panel">
        <canvas id="minimap-canvas"></canvas>
    </div>

    <script>
        (function() {
            // ==================== 全局配置 ====================
            const CONFIG = {
                worldSize: 32,        // 世界大小
                cellSize: 1,          // 单元格尺寸
                currentTool: 'grass', // 当前工具
                saveKey: 'blockWorld' // 本地存储键名
            };

            // ==================== 场景初始化 ====================
            let scene, camera, renderer, controls;
            let world = {}; // 核心数据结构 world[x][z] = { terrain, kind }
            let objectMap = new Map(); // 网格对象映射

            function initScene() {
                // 渲染器
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔和阴影
                renderer.setClearColor(0xf8f5e6); // 奶油色背景
                document.getElementById('scene-container').appendChild(renderer.domElement);

                // 场景
                scene = new THREE.Scene();

                // 相机
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(16, 20, 16);
                camera.lookAt(0, 0, 0);

                // 轨道控制
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.maxPolarAngle = Math.PI / 2 - 0.1;
            }

            // ==================== 光照系统 - 日光感 ====================
            function initLight() {
                // 环境光
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambientLight);

                // 主日光 - 柔和不发白
                const sunLight = new THREE.DirectionalLight(0xfff9e6, 0.8);
                sunLight.position.set(20, 30, 15);
                sunLight.castShadow = true;
                sunLight.shadow.mapSize.width = 1024;
                sunLight.shadow.mapSize.height = 1024;
                sunLight.shadow.radius = 8; // 柔化阴影
                sunLight.shadow.bias = -0.001;
                scene.add(sunLight);
            }

            // ==================== 数据管理 - 唯一写入入口 ====================
            function initWorld() {
                // 初始化二维世界数据
                for (let x = -CONFIG.worldSize/2; x < CONFIG.worldSize/2; x++) {
                    world[x] = {};
                    for (let z = -CONFIG.worldSize/2; z < CONFIG.worldSize/2; z++) {
                        world[x][z] = { terrain: 'grass', kind: null };
                    }
                }
                loadWorld(); // 加载本地存储
            }

            // 唯一写入入口
            function setCell(x, z, data) {
                if (!world[x] || !world[x][z]) return;
                world[x][z] = { ...world[x][z], ...data };
                updateCellVisual(x, z);
                saveWorld();
                renderMinimap();
            }

            // ==================== 积木工厂 - 创建模型 ====================
            const geometryPool = {};
            const materialPool = {};

            function initFactory() {
                // 基础几何体
                geometryPool.cube = new THREE.BoxGeometry(CONFIG.cellSize, 1, CONFIG.cellSize);
                geometryPool.halfCube = new THREE.BoxGeometry(CONFIG.cellSize, 0.5, CONFIG.cellSize);
                geometryPool.sphere = new THREE.SphereGeometry(0.5, 8, 8);

                // 积木风格材质 - 高饱和
                materialPool.grass = new THREE.MeshLambertMaterial({ color: 0x4ade5e });
                materialPool.water = new THREE.MeshLambertMaterial({ color: 0x2563eb });
                materialPool.tree = new THREE.MeshLambertMaterial({ color: 0x16a34a });
                materialPool.house = new THREE.MeshLambertMaterial({ color: 0xf97316 });
            }

            // 更新单元格视觉
            function updateCellVisual(x, z) {
                const key = `${x},${z}`;
                if (objectMap.has(key)) {
                    scene.remove(objectMap.get(key));
                    objectMap.delete(key);
                }

                const cell = world[x][z];
                const group = new THREE.Group();
                group.position.set(x, 0, z);

                // 地形
                const terrainMat = cell.terrain === 'water' ? materialPool.water : materialPool.grass;
                const terrain = new THREE.Mesh(geometryPool.cube, terrainMat);
                terrain.position.y = -0.5;
                terrain.receiveShadow = true;
                group.add(terrain);

                // 物体
                if (cell.kind === 'tree') {
                    const tree = new THREE.Mesh(geometryPool.sphere, materialPool.tree);
                    tree.position.y = 0.8;
                    tree.castShadow = true;
                    group.add(tree);
                }
                if (cell.kind === 'house') {
                    const house = new THREE.Mesh(geometryPool.halfCube, materialPool.house);
                    house.position.y = 0.25;
                    house.castShadow = true;
                    group.add(house);
                }

                scene.add(group);
                objectMap.set(key, group);
            }

            // 生成整个世界
            function generateAllVisual() {
                for (let x in world) {
                    for (let z in world[x]) {
                        updateCellVisual(Number(x), Number(z));
                    }
                }
            }

            // ==================== 交互系统 ====================
            let raycaster = new THREE.Raycaster();
            let mouse = new THREE.Vector2();

            function initInteraction() {
                // 工具切换
                document.querySelectorAll('.tool-card').forEach(card => {
                    card.addEventListener('click', () => {
                        document.querySelector('.tool-card.active').classList.remove('active');
                        card.classList.add('active');
                        CONFIG.currentTool = card.dataset.type;
                    });
                });

                // 鼠标点击建造
                window.addEventListener('click', onMouseClick);

                // 窗口适配
                window.addEventListener('resize', onWindowResize);
            }

            function onMouseClick(event) {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);

                for (let i of intersects) {
                    const pos = i.object.position;
                    const x = Math.round(pos.x);
                    const z = Math.round(pos.z);
                    
                    if (world[x] && world[x][z]) {
                        const tool = CONFIG.currentTool;
                        if (tool === 'water' || tool === 'grass') {
                            setCell(x, z, { terrain: tool });
                        } else {
                            setCell(x, z, { kind: tool === world[x][z].kind ? null : tool });
                        }
                        break;
                    }
                }
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderMinimap();
            }

            // ==================== 数据持久化 ====================
            function initPersistence() {
                document.getElementById('reset-btn').addEventListener('click', resetWorld);
                document.getElementById('clear-btn').addEventListener('click', clearWorld);
            }

            function saveWorld() {
                localStorage.setItem(CONFIG.saveKey, JSON.stringify(world));
            }

            function loadWorld() {
                const data = localStorage.getItem(CONFIG.saveKey);
                if (data) world = JSON.parse(data);
            }

            function resetWorld() {
                initWorld();
                generateAllVisual();
                renderMinimap();
            }

            function clearWorld() {
                for (let x in world) {
                    for (let z in world[x]) {
                        setCell(Number(x), Number(z), { terrain: 'grass', kind: null });
                    }
                }
            }

            // ==================== 小地图 - Canvas2D 俯视 ====================
            let minimap, ctx;

            function initMinimap() {
                minimap = document.getElementById('minimap-canvas');
                ctx = minimap.getContext('2d');
                minimap.width = 160;
                minimap.height = 160;
            }

            function renderMinimap() {
                const size = minimap.width;
                const half = size / 2;
                const scale = size / CONFIG.worldSize;

                ctx.clearRect(0, 0, size, size);
                
                // 绘制地形
                for (let x in world) {
                    for (let z in world[x]) {
                        const cell = world[x][z];
                        const px = half + Number(x) * scale;
                        const pz = half + Number(z) * scale;
                        const s = scale * 0.9;

                        // 地形颜色
                        ctx.fillStyle = cell.terrain === 'water' ? '#2563eb' : '#4ade5e';
                        ctx.fillRect(px, pz, s, s);

                        // 物体剪影
                        if (cell.kind) {
                            ctx.fillStyle = cell.kind === 'tree' ? '#16a34a' : '#f97316';
                            ctx.beginPath();
                            ctx.arc(px + s/2, pz + s/2, s/3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }

            // ==================== 渲染循环 ====================
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }

            // ==================== 启动程序 ====================
            function start() {
                initScene();
                initLight();
                initFactory();
                initWorld();
                initInteraction();
                initPersistence();
                initMinimap();
                generateAllVisual();
                renderMinimap();
                animate();
            }

            start();
        })();
    </script>
</body>
</html>
