<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <ul id="todos"></ul>
    <script>

        //         console.log(data);
        //         todos.innerHTML = data.map(todo => `<li>${todo.title}</li>`).join('')

        async function main() {
          const res = await fetch("http://localhost:8080/todos")
          const data = await res.json();
          todos.innerHTML = data.map(todo => `<li>${todo.title}</li>`).join('')
        }
        main()
            
    </script>

</body>
